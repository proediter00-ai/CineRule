name: CineRule Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '*.md'

concurrency:
  group: "cinerule-build"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build debug APK
      run: ./gradlew assembleStableDebug

    - name: Rename APK
      run: |
        VERSION=$(grep 'versionName' gradle/libs.versions.toml | head -1 | sed 's/.*= "//;s/"//')
        cp app/build/outputs/apk/stable/debug/app-stable-debug.apk CineRule-${VERSION}.apk
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        echo "APK_NAME=CineRule-${VERSION}.apk" >> $GITHUB_ENV

    - name: Update releases.json
      run: |
        cat > releases.json << EOF
        [{ "tag_name": "v${{ env.VERSION }}", "body": "Auto-built from latest code changes.", "prerelease": false, "node_id": "cinerule-${{ env.VERSION }}", "assets": [ { "name": "${{ env.APK_NAME }}", "size": 35000000, "browser_download_url": "https://github.com/${{ github.repository }}/releases/download/latest/${{ env.APK_NAME }}", "content_type": "application/vnd.android.package-archive" } ] }]
        EOF

    - name: Create/Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "CineRule v${{ env.VERSION }}"
        body: "Auto-built from latest code changes."
        prerelease: false
        files: |
          ${{ env.APK_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push updated releases.json
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add releases.json
        git diff --cached --quiet || git commit -m "Update releases.json for v${{ env.VERSION }}"
        git push
